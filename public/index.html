<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JalaStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #131316;
    --surface2: #1a1a1f;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.13);
    --text: #f0f0f2;
    --muted: #6b6b78;
    --muted2: #9090a0;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.12);
    --live: #ff3b3b;
    --live-dim: rgba(255,59,59,0.15);
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOP NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,11,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .nav-logo span { color: var(--accent); }

  .nav-tabs {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
  }
  .nav-tab {
    padding: 5px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: none;
  }
  .nav-tab.active {
    background: var(--surface2);
    color: var(--text);
  }
  .nav-tab:hover:not(.active) { color: var(--text); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(255,59,59,0.4);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,59,59,0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(255,59,59,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,59,59,0); }
  }

  .live-count {
    font-size: 12px;
    font-weight: 600;
    color: var(--live);
    letter-spacing: 0.3px;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 940px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── LIVE SECTION ── */
  .live-section { margin-bottom: 32px; }

  .live-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .live-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .live-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--live);
  }
  .live-card:hover {
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .live-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .league-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted2);
    letter-spacing: 0.3px;
  }
  .league-icon {
    width: 18px; height: 18px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .league-icon.football { background: rgba(34,197,94,0.2); color: #22c55e; }
  .league-icon.basketball { background: rgba(249,115,22,0.2); color: #f97316; }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--live-dim);
    border: 1px solid rgba(255,59,59,0.25);
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 700;
    color: var(--live);
    letter-spacing: 0.8px;
  }
  .live-badge .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.8s infinite;
  }

  .match-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .team-side {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .team-side.right {
    flex-direction: row-reverse;
    text-align: right;
  }

  .team-crest {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .team-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .team-short {
    font-size: 11px;
    color: var(--muted2);
    margin-top: 1px;
  }

  .score-block {
    text-align: center;
    flex-shrink: 0;
    min-width: 70px;
  }

  .score {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
    letter-spacing: -1px;
  }

  .match-clock {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  .match-extra {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }

  .stat-pill {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-pill strong { color: var(--muted2); font-weight: 500; }

  .watch-btn {
    margin-left: auto;
    background: var(--accent-dim);
    border: 1px solid rgba(200,255,0,0.2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .watch-btn:hover { background: rgba(200,255,0,0.2); }

  .watch-btn svg { width: 10px; height: 10px; fill: var(--accent); }

  /* ── UPCOMING SECTION ── */
  .upcoming-section { margin-top: 8px; }

  .day-group { margin-bottom: 24px; }

  .day-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .day-header .day-name { color: var(--muted2); }
  .day-header .match-count {
    font-size: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 2px 8px;
    color: var(--muted);
  }

  .fixture-row {
    display: flex;
    align-items: center;
    padding: 11px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    gap: 12px;
    border: 1px solid transparent;
  }
  .fixture-row:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .fixture-time {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted2);
    width: 42px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .fixture-league {
    width: 20px; height: 20px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }

  .fixture-teams {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fixture-team {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .vs-sep {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .fixture-meta {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    flex-shrink: 0;
    line-height: 1.4;
  }

  /* ── FILTER PILLS ── */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-pill {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-pill.active {
    background: var(--accent-dim);
    border-color: rgba(200,255,0,0.3);
    color: var(--accent);
  }
  .filter-pill:hover:not(.active) {
    border-color: var(--border-hover);
    color: var(--text);
  }

  /* ── STREAM MODAL ── */
  .stream-modal {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .stream-modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
  }
  .stream-modal-content {
    position: relative;
    width: 95vw; max-width: 960px;
    aspect-ratio: 16/9;
    max-height: 90vh;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .stream-modal-header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(rgba(0,0,0,0.8), transparent);
    color: var(--text);
    font-size: 13px; font-weight: 600;
  }
  .stream-modal-close {
    background: none; border: none; color: var(--muted2);
    font-size: 18px; cursor: pointer; padding: 4px 8px;
    border-radius: 6px;
  }
  .stream-modal-close:hover { color: var(--text); background: rgba(255,255,255,0.1); }
  .stream-modal-body {
    width: 100%; height: 100%;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    .live-grid { grid-template-columns: 1fr; }
    nav { padding: 0 14px; }
    .container { padding: 16px 14px 48px; }
    .score { font-size: 30px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Jala<span>Stream</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab(this,'live')">Live</button>
    <button class="nav-tab" onclick="setTab(this,'schedule')">Jadwal</button>
  </div>
  <div class="nav-right">
    <div class="live-dot"></div>
    <span class="live-count">—</span>
  </div>
</nav>

<div class="container">

  <!-- LIVE TAB -->
  <div id="tab-live">
    <div class="live-section">
      <div class="section-label">Sedang berlangsung</div>
      <div class="live-grid">
        <div class="empty">Memuat...</div>
      </div>
    </div>
  </div>

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" style="display:none">
    <div class="empty">Pilih tab Jadwal untuk memuat...</div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
